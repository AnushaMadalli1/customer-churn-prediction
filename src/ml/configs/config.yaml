data:
  raw_path: '../data/raw/churn.csv'
  processed_path: '../data/processed/processed_churn.csv'
  test_size: 0.2
  random_state: 42

random_state: 42
cv_folds: 3

models:
  rf:
    class: 'RandomForestClassifier'
    n_estimators: 100
    max_depth: 10
  lr:
    class: 'LogisticRegression'
    C: 1.0
    max_iter: 200
  rf_tuned:
    param_grid:
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, None]
      min_samples_split: [2, 5]
  model_path: '../data/processed/best_model.joblib'
  random_state: 42
  cv_folds: 3

api:
  host: '0.0.0.0'
  port: 8000

app:
  port: 8501

